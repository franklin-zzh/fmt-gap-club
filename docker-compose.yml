services:
  backend:
    build: ./backend
    container_name: gap-club-backend
    restart: always
    ports:
      - "127.0.0.1:8000:8000"     # 只监听本地，Nginx 通过反向代理访问
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
    environment:
      - TZ=Asia/Shanghai
    networks:
      - gapclub

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api/v1
        VITE_APP_OSS_BASE_URL: https://assets.gapclub.fmtcloud.cn
    container_name: gap-club-frontend
    restart: always
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend
    networks:
      - gapclub

networks:
  gapclub:
    driver: bridge