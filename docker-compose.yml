services:
  backend:
    build: ./backend
    container_name: gap-club-backend
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
    environment:
      - TZ=Asia/Shanghai
      - DATABASE_URL=mysql+pymysql://root:qK5_vD2.hY8+mX3d@mysql8:3306/gap_club?charset=utf8mb4
    networks:
      - fmtsw-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api/v1
        VITE_APP_OSS_BASE_URL: https://assets.gapclub.fmtcloud.cn
    container_name: gap-club-frontend
    restart: always
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend
    networks:
      - fmtsw-net

networks:
  fmtsw-net:
    external: true
    name: fmtsw-infra_fmtsw-net
